services:
  tradingbot:
    build: .
    container_name: tradingbot
    restart: unless-stopped
    env_file: .env
    environment:
      - ENV=production
      - HEALTH_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./params:/app/params
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
